<!-- Login para el sistema -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://unpkg.com/@csstools/normalize.css" rel="stylesheet" />
</head>

<body>

    <style>
        :root {
            --color: purple;
        }

        * {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            border: none;
        }

        body {
            background-color: whitesmoke;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        form {
            width: 80%;
            border-radius: 10px;
            padding: 1.5rem;
            background-color: white;
            box-shadow: 0 5px 15px rgb(196, 196, 196);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        /* fieldset{
            border: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        } */
        h1 {
            text-align: center;
            font-weight: bolder;
            text-transform: uppercase;
            font-size: 1rem;
            color: var(--color);
        }

        p {
            text-align: center;
            color: rgb(128, 128, 128);
        }

        .inputs {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 100%;
        }

        label{
            font-weight: bold;
        }

        input {
            border: solid 1px grey;
            padding: 0.2rem 0.7rem;
            border-radius: 0.5rem;
        }

        input:focus {
            --color-b: rgb(0, 162, 255);
            outline: 1px solid var(--color-b);
            border-color: var(--color-b);
        }

        input[type="submit"] {
            background-color: var(--color);
            color: white;
            font-weight: bold;
        }
    </style>

    <form action="" method="post">
        <img src="/Public/img/logo.svg" alt="logo" width="50px" height="50px">
        <h1>clientes</h1>
        <p>Bienvenido de vuelta! Inicia sesión para continuar.</p>
        <div class="inputs">
            <label for="email">Correo electronico *</label>
            <input type="email" name="email" id="email" placeholder="tu@email.com">
            <label for="password">Contraseña *</label>
            <input type="password" name="password" id="password" placeholder="Tu contraseña">
            <label for="view-pass"><input type="checkbox" name="view-pass" id="view-pass"> Mostrar contraseña.</label>
            <input type="submit" value="Iniciar Sesión">
        </div>
    </form>

</body>
</html>

<script>
    let btnView = document.getElementById('view-pass');
    let inPass = document.getElementById('password');

    btnView.addEventListener('change', ()=>{
        if(btnView.checked){
            inPass.type = 'text';
        }else{
            inPass.type = 'password';
        }
    })
</script>
